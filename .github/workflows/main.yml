name: VPN Check and Update
on:
  schedule:
    - cron: '0 */1 * * *' # Запуск каждый час
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Download Xray Checker
        run: |
          # Скачиваем готовый инструмент для глубокой проверки Xray
          curl -L https://github.com/v2fly/xray-core/releases/latest/download/Xray-linux-64.zip -o xray.zip # Это пример, обычно нужен спец. чекер
          # Для простоты скачаем легковесный чекер (имитация)
          wget https://github.com/Paimonko/xray-checker/releases/download/v1.0.0/xray-checker-linux-amd64 -O xray-checker
          chmod +x xray-checker

      - name: Run Check Script
        run: python check.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add results.txt
          git commit -m "Update working configs" || exit 0
          git push