name: VPN Checker Pro
on:
  workflow_dispatch:
  push:
    paths:
      - 'check.txt'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Xray Checker
        run: |
          # Используем команду из твоей инструкции для Linux amd64
          curl -sL -o - $(curl -s https://api.github.com/repos/kutovoys/xray-checker/releases/latest | grep "browser_download_url.*linux-amd64.tar.gz" | cut -d'"' -f4) | tar -xz
          chmod +x xray-checker

      - name: Run Check
        run: |
          # 1. Формируем заголовок для итогового файла
          echo "#profile-title: LLxickVPN" > results.txt
          echo "#profile-update-interval: 12" >> results.txt
          echo "" >> results.txt
          
          # 2. Запускаем чекер в режиме "одиночной проверки" (--run-once)
          # Мы скармливаем ему локальный файл через file://
          ./xray-checker --subscription-url="file://$GITHUB_WORKSPACE/check.txt" --run-once
          
          # 3. После работы чекер создаст отчет. 
          # ВНИМАНИЕ: Нам нужно достать только живые ссылки. 
          # Обычно такие чекеры выводят результат в консоль или создают файл.
          # Если он просто выводит в консоль, мы перенаправим вывод:
          ./xray-checker --subscription-url="file://$GITHUB_WORKSPACE/check.txt" --run-once > output.log
          
          # Очистка и нумерация (фильтруем только строки с vless://)
          grep "vless://" output.log | while read -r line; do
            n=$((n+1))
            base=$(echo $line | cut -d'#' -f1)
            echo "${base}#🇷🇺 [LTE] №$n" >> results.txt
          done

      - name: Push results
        run: |
          git config --global user.name "VPN-Bot"
          git config --global user.email "bot@github.com"
          git add results.txt
          git commit -m "Update via Xray Checker Pro" || exit 0
          git push