name: VPN Auto-Collector and Checker
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get install -y bc python3-pip
          pip3 install matplotlib requests pillow

      - name: Install Xray Checker
        run: |
          curl -sL -o - $(curl -s https://api.github.com/repos/kutovoys/xray-checker/releases/latest | grep "browser_download_url.*linux-amd64.tar.gz" | cut -d'"' -f4) | tar -xz
          chmod +x xray-checker

      - name: Collect Configs
        run: |
          > check.txt

          curl -s https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/BLACK_VLESS_RUS_mobile.txt > s1.txt
          n=1
          while read -r line; do
            if [[ $line == vless://* ]]; then
              base=$(echo "$line" | cut -d'#' -f1)
              echo "${base}#[WI-FI] N$n" >> check.txt
              n=$((n+1))
            fi
          done < s1.txt

          curl -s https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt > s2.txt
          n=1
          while read -r line; do
            if [[ $line == vless://* ]]; then
              base=$(echo "$line" | cut -d'#' -f1)
              echo "${base}#[LTE] N$n" >> check.txt
              n=$((n+1))
            fi
          done < s2.txt

          curl -s https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/WHITE-CIDR-RU-checked.txt > s3.txt
          n=1
          while read -r line; do
            if [[ $line == vless://* ]]; then
              base=$(echo "$line" | cut -d'#' -f1)
              echo "${base}#[LTE] N$n" >> check.txt
              n=$((n+1))
            fi
          done < s3.txt

      - name: Run Check
        run: |
          TOTAL=$(grep -c "vless://" check.txt || echo "0")
          echo "Всего собрано: $TOTAL"

          python3 -m http.server 8000 &
          sleep 3

          # Проверяем реальной загрузкой файла — отсеивает "замороженные" конфиги
          ./xray-checker \
            --subscription-url="http://localhost:8000/check.txt" \
            --proxy-check-method=download \
            --proxy-download-url="http://speedtest.tele2.net/1MB.zip" \
            --proxy-download-min-size=51200 \
            --proxy-download-timeout=15 \
            --proxy-timeout=10 \
            --run-once > full_log.txt 2>&1

          UPD_DATE=$(TZ='Europe/Moscow' date +'%d.%m.%Y %H:%M')
          ANNOUNCE_TEXT="UPD: $UPD_DATE | обновление каждые 30 мин | тгк @LLxickVPN"

          echo "#profile-title: LLxickVPN" > results.txt
          echo "#support-url: https://t.me/LLxick2" >> results.txt
          echo "#profile-update-interval: 1" >> results.txt
          echo "#announce: $ANNOUNCE_TEXT" >> results.txt
          echo "" >> results.txt

          > wifi.tmp
          > lte.tmp
          > all_latencies.tmp

          grep "Success" full_log.txt | while read -r line; do
            latency=$(echo "$line" | grep -oP 'Latency: \K[0-9.]+' | head -n 1)
            proxy_name=$(echo "$line" | sed -E 's/^[0-9\/ :]* [0-9]{2}:[0-9]{2}:[0-9]{2} (.*) \| Success.*/\1/' | xargs)
            if [ ! -z "$latency" ] && [ ! -z "$proxy_name" ]; then
              echo "$latency" >> all_latencies.tmp
              if (( $(echo "$latency < 2.0" | bc -l) )); then
                config=$(grep -F "$proxy_name" check.txt | head -n 1)
                if [ ! -z "$config" ]; then
                  if echo "$config" | grep -q "\[WI-FI\]"; then
                    echo "$latency $config" >> wifi.tmp
                  else
                    echo "$latency $config" >> lte.tmp
                  fi
                fi
              fi
            fi
          done

          sort -n wifi.tmp -o wifi_sorted.tmp
          head -n 25 wifi_sorted.tmp | sed 's/^[0-9.]* //; s/#\[WI-FI\] N[0-9]*$/#[WI-FI]/' >> results.txt

          sort -n lte.tmp -o lte_sorted.tmp
          head -n 25 lte_sorted.tmp | sed 's/^[0-9.]* //; s/#\[LTE\] N[0-9]*$/#[LTE]/' >> results.txt

          BEST_LATENCY=$(sort -n all_latencies.tmp | head -n 1)
          AVG_LATENCY=$(awk '{sum+=$1; count++} END {if(count>0) printf "%.3f", sum/count}' all_latencies.tmp)
          [ -z "$BEST_LATENCY" ] && BEST_LATENCY="0"
          [ -z "$AVG_LATENCY" ] && AVG_LATENCY="0"

          rm -f wifi.tmp lte.tmp wifi_sorted.tmp lte_sorted.tmp all_latencies.tmp

          FINAL=$(grep -c "vless://" results.txt || echo "0")
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "FINAL=$FINAL" >> $GITHUB_ENV
          echo "UPD_DATE=$UPD_DATE" >> $GITHUB_ENV
          echo "BEST_LATENCY=$BEST_LATENCY" >> $GITHUB_ENV
          echo "AVG_LATENCY=$AVG_LATENCY" >> $GITHUB_ENV
          echo "Финальный результат: $FINAL конфигов | лучший: ${BEST_LATENCY}s | средний: ${AVG_LATENCY}s"

      - name: Load History & Build Chart
        run: |
          if [ -f "history.json" ]; then
            cp history.json history_prev.json
          else
            echo "[]" > history_prev.json
          fi

          python3 << 'PYEOF'
          import json, os, datetime, matplotlib
          matplotlib.use('Agg')
          import matplotlib.pyplot as plt
          import matplotlib.dates as mdates
          from datetime import timezone

          total = int(os.environ.get("TOTAL", 0))
          final = int(os.environ.get("FINAL", 0))
          upd_date = os.environ.get("UPD_DATE", "")
          best_lat = float(os.environ.get("BEST_LATENCY", 0))
          avg_lat = float(os.environ.get("AVG_LATENCY", 0))
          now = datetime.datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

          try:
              with open("history_prev.json") as f:
                  history = json.load(f)
          except:
              history = []

          history.append({
              "time": now,
              "total": total,
              "working": final,
              "best_latency": best_lat,
              "avg_latency": avg_lat
          })
          history = history[-48:]

          with open("history.json", "w") as f:
              json.dump(history, f, indent=2)

          times = [datetime.datetime.fromisoformat(h["time"].replace("Z", "+00:00")) for h in history]
          best_lats = [h.get("best_latency", 0) for h in history]
          avg_lats = [h.get("avg_latency", 0) for h in history]
          workings = [h["working"] for h in history]

          fig, (ax1, ax2) = plt.subplots(2, 1, figsize=(10, 8))
          fig.patch.set_facecolor('#1a1a2e')

          # --- График 1: Латентность ---
          ax1.set_facecolor('#16213e')
          ax1.plot(times, best_lats, color='#81c784', linewidth=2, marker='o', markersize=4, label='Лучшая латентность (s)')
          ax1.plot(times, avg_lats, color='#ffb74d', linewidth=2, marker='o', markersize=4, label='Средняя латентность (s)')
          ax1.fill_between(times, best_lats, alpha=0.15, color='#81c784')
          ax1.set_title(f'LLxickVPN — Латентность | {upd_date} МСК', color='white', fontsize=12, pad=10)
          ax1.set_ylabel('Латентность (сек)', color='#aaaaaa')
          ax1.tick_params(colors='#aaaaaa')
          ax1.xaxis.set_major_formatter(mdates.DateFormatter('%H:%M'))
          ax1.xaxis.set_major_locator(mdates.HourLocator(interval=2))
          plt.setp(ax1.xaxis.get_majorticklabels(), rotation=30)
          for spine in ax1.spines.values():
              spine.set_edgecolor('#333355')
          ax1.legend(facecolor='#1a1a2e', labelcolor='white', edgecolor='#333355')
          ax1.grid(alpha=0.15, color='white')
          if times:
              ax1.annotate(f'  {best_lat:.3f}s', xy=(times[-1], best_lat), color='#81c784', fontsize=9)
              ax1.annotate(f'  {avg_lat:.3f}s', xy=(times[-1], avg_lat), color='#ffb74d', fontsize=9)

          # --- График 2: Количество рабочих конфигов ---
          ax2.set_facecolor('#16213e')
          ax2.plot(times, workings, color='#4fc3f7', linewidth=2, marker='o', markersize=4, label='Топ 50 конфигов (<2s)')
          ax2.fill_between(times, workings, alpha=0.15, color='#4fc3f7')
          ax2.set_title('Количество конфигов в подписке', color='white', fontsize=12, pad=10)
          ax2.set_xlabel('Время (UTC)', color='#aaaaaa')
          ax2.set_ylabel('Конфигов', color='#aaaaaa')
          ax2.tick_params(colors='#aaaaaa')
          ax2.xaxis.set_major_formatter(mdates.DateFormatter('%H:%M'))
          ax2.xaxis.set_major_locator(mdates.HourLocator(interval=2))
          plt.setp(ax2.xaxis.get_majorticklabels(), rotation=30)
          for spine in ax2.spines.values():
              spine.set_edgecolor('#333355')
          ax2.legend(facecolor='#1a1a2e', labelcolor='white', edgecolor='#333355')
          ax2.grid(alpha=0.15, color='white')
          if times:
              ax2.annotate(f'  {final}', xy=(times[-1], final), color='#4fc3f7', fontsize=9)

          plt.tight_layout(pad=2.0)
          plt.savefig("chart.png", dpi=130, bbox_inches='tight', facecolor='#1a1a2e')
          print("Chart saved.")

          prev_working = history[-2]["working"] if len(history) >= 2 else final
          delta = final - prev_working
          delta_str = f"+{delta}" if delta > 0 else str(delta)
          with open("delta.txt", "w") as f:
              f.write(delta_str)
          PYEOF

      - name: Send Telegram Notification
        env:
          TG_TOKEN: "8692993139:AAHcTnsA-fJk89bdIcIURr-bVkzvHjeLwb4"
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          DELTA=$(cat delta.txt 2>/dev/null || echo "0")

          if [[ "$DELTA" == +* && "$DELTA" != "+0" ]]; then
            TREND="📈"
          elif [[ "$DELTA" == -* ]]; then
            TREND="📉"
          else
            TREND="➡️"
          fi

          if [ "$TOTAL" -gt 0 ]; then
            PERCENT=$(echo "scale=1; $FINAL * 100 / $TOTAL" | bc)
          else
            PERCENT="0"
          fi

          LINE1="🔐 *LLxickVPN — Отчёт проверки*"
          LINE2="🕐 *Обновлено:* \`$UPD_DATE МСК\`"
          LINE3="📦 *Всего собрано:* \`$TOTAL\`"
          LINE4="✅ *В подписке:* \`$FINAL\` ($PERCENT%)"
          LINE5="⚡ *Лучшая латентность:* \`${BEST_LATENCY}s\`"
          LINE6="📊 *Средняя латентность:* \`${AVG_LATENCY}s\`"
          LINE7="$TREND *Изменение:* \`$DELTA\` за 30 мин"
          LINE8="↩️ Обновление каждые 30 минут автоматически"
          LINE9="📢 @LLxickVPN"
          MESSAGE=$(printf '%s\n\n%s\n%s\n%s\n%s\n%s\n%s\n\n%s\n%s' "$LINE1" "$LINE2" "$LINE3" "$LINE4" "$LINE5" "$LINE6" "$LINE7" "$LINE8" "$LINE9")

          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendPhoto" \
            -F "chat_id=${TG_CHAT_ID}" \
            -F "photo=@chart.png" \
            -F "caption=$MESSAGE" \
            -F "parse_mode=Markdown"

      - name: Push results
        run: |
          git config --global user.name "VPN-Bot"
          git config --global user.email "bot@github.com"
          git add results.txt history.json chart.png
          git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
          git pull --rebase origin main
          git push